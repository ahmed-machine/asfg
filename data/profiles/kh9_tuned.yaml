inherits: _base

meta:
  name: kh9_tuned
  description: KH-9 with best params from Optuna tuning (March 2026)
  cameras: [KH-9]

coarse:
  template_radius_m: 6000
  coarse_res: 10.0
  refine_res: 7.5
  search_margin_m: 200

scale_rotation:
  detection_res: 4.5
  grid_cols: 5
  grid_rows: 3
  min_valid_frac: 0.42

matching:
  roma_size: 616
  roma_num_corresp: 900
  ransac_reproj_threshold: 2.31
  land_mask_frac_min: 0.19
  tile_joint_land_min: 0.08
  match_quota_per_cell: 30

validation:
  anchor_inlier_threshold: 7
  cv_refit_threshold_m: 77.0
  tin_tarr_thresh: 2.46
  skip_fpp: true
  mad_sigma: 1.89

grid_optim:
  early_stop_threshold: 0.001
  lr: 0.0018
  w_data: 1.05
  w_chamfer: 0.36
  w_feat: 0.046
  w_arap: 1.18
  w_laplacian: 0.49
  w_disp: 0.073
  w_pixel: 2.13
  pixel_ncc_res: 4.33
  pixel_ncc_window: 7
  pixel_ncc_cadence: 1
  feat_extract_res: 11.83
  feat_coverage_gate: false
  feat_scale_factor: 0.34
  feat_mid_ratio: 0.027
  feat_lncc_window: 11
  level_w_data_scale: [1.0, 2.89, 3.86]
  level_w_disp_scale: [1.0, 0.96, 0.63]
  level_reg_scale: [1.0, 1.01, 1.01]
  level_chamfer_scale: [1.0, 0.95, 0.26]
  level_w_pixel_scale: [0.0, 0.76, 0.60]
  level_w_feat_scale: [0.0, 1.17, 0.52]
