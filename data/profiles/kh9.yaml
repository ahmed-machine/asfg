inherits: _base

meta:
  name: kh9
  description: KH-9 Hexagon Panoramic Camera (D3C, 1973-1984) — Fore/Aft stereo pairs
  cameras: [KH-9 PC]

# KH-9 Panoramic Camera: rotating-lens system similar to KH-4 but with longer
# focal length and wider scan arc. D3C entity prefix = USGS Declass-3 dataset.
# Parameters sourced from public NRO documentation and the 2OC paper framework
# (Hou et al. 2023, Remote Sensing 15(21):5116) — apply the same physics.
camera:
  type: opticalbar
  focal_length: 1.524          # metres (60 in — KH-9 panoramic camera)
  pixel_pitch: 7.0e-6          # metres (7 μm USGS scan)
  nominal_altitude_km: 197     # catalog-mean from perigee/apogee; 1212 actual 196-217 km

  # Scan time is mode-dependent per NRO Preliminary KH-9 Camera Manual
  # 1969 (p. 10): max film velocity 204 in/s, synchronous with angular
  # scan rate, format lengths 2.62/5.24/7.86/10.48 ft for 30°/60°/90°/
  # 120°. At 204 in/s peak this gives scan times ~0.154/0.308/0.463/0.617
  # s. Most D3C deliveries are 120° scans, so 0.62 s is the new default.
  # Override per-scene via USGS titling "Swath Center" + "Swath Indicator"
  # fields when available.
  scan_time: 0.62              # seconds — 120° scan mode @ nominal V/H
  speed: 7800                  # m/s orbital velocity (~170 km altitude)
  forward_tilt: 0.1745         # 10° for Fore/Aft stereo pairs (sign flipped by process.py based on A/F designation)
  scan_dir: right
  motion_compensation_factor: 1.0
  # KH-9 PC USGS corners are within a few km — preprocess coarse-align
  # reliably converges. Treat the abstain branch as a real failure that
  # should *not* hard-skip alignment (it's likely a local matching glitch
  # rather than a fundamentally misplaced ortho).
  usgs_corners_reliable: true
  # Physical scan arc ~120° but align/grid_optim.py's 1/cos²(θ) prior
  # breaks past wide arcs. ASP mapproject already corrects bow-tie, so
  # we disable the in-house prior. Revisit if ASP is bypassed.
  scan_arc_deg: 0.0
  # Pin focal length per CoSP/Ghuffar-2023 published practice. Both
  # canonical KH-9 PC workflows (CoSP 2022 §III-C; Ghuffar 2023 Cryosphere)
  # fix f at 1.524 m nominal to break the f/Zs0 gauge degeneracy.
  fix_f: true
  # KH-9 PC uses platen-rotation IMC (Manual p. 10), not KH-4B's lens-
  # rotation mechanism. CoSP §V-A attributes KH-4B's ω₁ ≈ 0.76–1.09°/t
  # to absorbing the lens rotation; KH-9's ω₁ shouldn't need that.
  # Tighten from ±1.0° → ±0.2° to keep attitude rates physical.
  rate_range_deg: 0.2
  # Strip-level Zs0 from cam_gen on the stitched raw strip; pinned into
  # camera generation. cam_gen rejected if outside [140, 280] km with
  # fallback to TLE.
  cam_gen_altitude: true

coarse:
  coarse_res: 10.0
  refine_res: 7.5
  search_margin_m: 200

scale_rotation:
  detection_res: 4.5
  grid_cols: 5
  grid_rows: 3
  min_valid_frac: 0.42

matching:
  roma_size: 784
  roma_num_corresp: 1000
  ransac_reproj_threshold: 2.86
  land_mask_frac_min: 0.33
  tile_joint_land_min: 0.08
  match_quota_per_cell: 40
  estimation_method: magsac

validation:
  anchor_inlier_threshold: 7
  cv_refit_threshold_m: 77.0

grid_optim:
  early_stop_threshold: 0.000106
  lr: 0.00946
  w_data: 0.509
  w_chamfer: 0.795
  w_arap: 1.133
  w_laplacian: 0.992
  w_disp: 0.081
  level_w_data_scale: [1.0, 1.607, 1.963]
  level_w_disp_scale: [1.0, 0.441, 0.301]
  level_reg_scale: [1.0, 1.410, 1.684]
  level_chamfer_scale: [1.0, 0.393, 0.515]

qa:
  accept_image_score_max: 120.0
  accept_holdout_median_max: 70.0
  accept_cv_mean_max: 70.0
