inherits: _base

meta:
  name: kh9
  description: KH-9 Hexagon Panoramic Camera (D3C, 1973-1984) — Fore/Aft stereo pairs
  cameras: [KH-9 PC]

# KH-9 Panoramic Camera: rotating-lens system similar to KH-4 but with longer
# focal length and wider scan arc. D3C entity prefix = USGS Declass-3 dataset.
# Parameters sourced from public NRO documentation and the 2OC paper framework
# (Hou et al. 2023, Remote Sensing 15(21):5116) — apply the same physics.
camera:
  type: opticalbar
  focal_length: 1.524          # metres (60 in — KH-9 panoramic camera)
  pixel_pitch: 7.0e-6          # metres (7 μm USGS scan)
  scan_time: 0.5               # seconds — nominal; refine via --solve-intrinsics
  speed: 7800                  # m/s orbital velocity (~170 km altitude)
  forward_tilt: 0.1745         # 10° for Fore/Aft stereo pairs (sign flipped by process.py based on A/F designation)
  scan_dir: right
  motion_compensation_factor: 1.0
  preprocess_matcher: roma
  panoramic_local_crs: ""
  gcp_search_pad_m: 10000
  gcp_match_res_m_coarse: 4.0
  gcp_match_res_m_fine: 2.0
  panoramic_fit_rms_px_max: 4.0
  # Hard gate relaxed from 20 → 25 to accommodate scenes where Stage B
  # converges at 20-25 px on water-dominant / low-feature sub-frames.
  # seg00 on Bahrain D3C1213 sits around 21 px with 208 coarse GCPs; the
  # single-camera fallback below is far worse than a slightly-loose fit.
  panoramic_fit_rms_px_hard_max: 25.0
  # Relaxed from 2.0 → 80.0 so segments with >10 px seam shift reach
  # Phase 3 TPS seam-warping (the whole point of Phase 3 is to fix
  # mismatched seams that Stage A/B couldn't). Single-camera fallback
  # is reserved for wholly pathological fits (e.g. runaway pose).
  panoramic_seam_shift_px_max: 80.0
  # Physical scan arc is ~120° but align/grid_optim.py set_panoramic_prior
  # uses a 1/cos²(θ) approximation that breaks at wide arcs (peak edge
  # displacement > 1.0 normalised at 120°). ASP mapproject already corrects
  # the true bow-tie distortion before grid_optim runs, so we disable the
  # in-house prior by setting scan_arc_deg: 0.0. Revisit if ASP is bypassed.
  scan_arc_deg: 0.0
  # 2OC paper (Hou et al. 2023, Table 6) measured 1.18% focal-length spread
  # across KH-4B sub-images of a single strip (0.6025-0.6096 m). KH-9 PC
  # spread is unmeasured in the paper; we assume similar-order drift and
  # let ASP bundle_adjust float focal_length per frame.
  bundle_adjust_solve_intrinsics: true
  # 2OC §3.1: orthorectify each USGS sub-frame independently with its own
  # OpticalBar camera model, then blend the results into a single target
  # mosaic. Avoids leaking per-segment offsets into a single-camera fit.
  # opticalbar_per_segment_precorrect handles (a) initial per-segment
  # cam_gen + mapproject, (b) median reference NCC shift (global offset),
  # and (c) pairwise phase-correlation seam alignment (fixes inter-segment
  # disagreement from the cam_gen 4-corner fit freedom).
  per_segment_ortho: true
  # Strip-level Zs0 from ASP cam_gen. Runs cam_gen ONCE on the stitched
  # raw strip (paired with the 4 USGS strip corners), parses altitude-
  # above-ellipsoid from the refined ECEF camera centre, and uses that
  # single value as the Zs0 seed for every sub-frame's 14-parameter LM
  # fit via fix_zs0=True. Breaks the f/Zs0 gauge-freedom basin that
  # otherwise collapses f to the ±30 % lower bound on narrow-row GCPs.
  #
  # Note: fix_f is NOT toggled by this flag. The Stage A/B call sites in
  # preprocess/camera_model.py pass fix_f=False unconditionally because
  # narrow-row KH-9 PC GCPs (typical coverage ~2 km out of 20 km sub-
  # frame) create an 18 % along/cross-track ground-scale asymmetry that
  # only a free f can absorb (see memory/fix_f_convergence_fix.md and
  # memory/kh_panoramic_14param_findings.md §2).
  #
  # cam_gen is seeded with a TLE-propagated altitude when available. If
  # cam_gen's refined result falls outside [140, 280] km it is rejected
  # and the fit falls back to TLE. Phase 3 of the recovery plan will
  # tighten this gate; today the only check is the range clamp.
  cam_gen_altitude: true
  # Phase 3 (smooth-vector-field seam reconciliation) — post-hoc TPS half-
  # warp applied to each segment's seam band. feather_px controls how far
  # into the segment interior the warp tapers; tps_smoothing regularises
  # the RBF; post_warp_rms_m_max is the hard reject threshold (falls back
  # to the unwarped blend if the TPS residual exceeds this).
  panoramic_seam_feather_px: 400
  panoramic_seam_tps_smoothing: 100.0
  panoramic_seam_post_warp_rms_m_max: 30.0

coarse:
  coarse_res: 10.0
  refine_res: 7.5
  search_margin_m: 200

scale_rotation:
  detection_res: 4.5
  grid_cols: 5
  grid_rows: 3
  min_valid_frac: 0.42

matching:
  roma_size: 784
  roma_num_corresp: 1000
  ransac_reproj_threshold: 2.86
  land_mask_frac_min: 0.33
  tile_joint_land_min: 0.08
  match_quota_per_cell: 40
  estimation_method: magsac

validation:
  anchor_inlier_threshold: 7
  cv_refit_threshold_m: 77.0

grid_optim:
  early_stop_threshold: 0.000106
  lr: 0.00946
  w_data: 0.509
  w_chamfer: 0.795
  w_arap: 1.133
  w_laplacian: 0.992
  w_disp: 0.081
  w_pixel: 3.93
  pixel_ncc_res: 2.77
  pixel_ncc_window: 5
  pixel_ncc_cadence: 3
  w_feat: 0.0025
  feat_extract_res: 7.43
  feat_coverage_gate: false
  feat_scale_factor: 1.665
  feat_mid_ratio: 0.359
  feat_lncc_window: 5
  level_w_data_scale: [1.0, 1.607, 1.963]
  level_w_disp_scale: [1.0, 0.441, 0.301]
  level_reg_scale: [1.0, 1.410, 1.684]
  level_chamfer_scale: [1.0, 0.393, 0.515]
  level_w_pixel_scale: [0.0, 0.724, 1.637]
  level_w_feat_scale: [0.0, 1.523, 0.961]

qa:
  accept_image_score_max: 120.0
  accept_holdout_median_max: 70.0
  accept_cv_mean_max: 70.0
